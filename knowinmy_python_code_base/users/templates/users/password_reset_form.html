{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Your Password</title>

    <!-- Custom Fonts -->
    <link href="https://fonts.googleapis.com/css?family=Nunito:200,300,400,600,700,800,900" rel="stylesheet" />

    <style>
        /* Base styling */
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(139deg, #cda1d6, #d3b0e2, #594c9f, #9a5cbf);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            max-width: 400px;
            margin: auto;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            background-color: #ffffff;
            text-align: center;
            padding: 40px;
            color: #333333;
        }

        h2 {
            margin-bottom: 20px;
            color: #4a438d; /* Dark violet for header */
            font-weight: 700;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.2);
        }

        p {
            color: #555555; /* Slightly darker grey for better contrast */
            font-size: 1rem;
            width: 100%;
            box-sizing: border-box;
        }

        /* Primary button */
        .btn-primary {
            background-color: #6533c9;
            border-color: #553cdf;
            border-radius: 10px;
            color: #ffffff;
            padding: 10px;
            font-size: 16px;
            width: 100%;
            transition: background-color 0.3s, transform 0.2s;
            cursor: pointer;
        }

        .btn-primary:hover {
            background-color: #432bbf;
            transform: translateY(-2px);
        }

        /* Placeholder styling */
        .form-control::placeholder {
            color: #888;
            font-style: italic;
        }

        /* Small link styling */
        .small {
            color: #553cdf;
            font-size: 0.9rem;
            text-decoration: none;
            transition: color 0.3s ease, text-shadow 0.3s ease;
        }

        .text-center .small:hover {
            color: #432bbf;
            text-shadow: 1px 1px 3px rgba(67, 43, 191, 0.4);
            text-decoration: underline;
        }

        .row.justify-content-center {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>Reset Your Password</h2>
            <form method="post" id="send_email_form">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary">Send Password Reset Email</button>
            </form>
            <hr />
            <a href="{% url 'login' %}" class="small">Back to Login</a>
        </div>
    </div>

    <script src="{% static 'vendor/jquery/jquery.min.js' %}"></script>
    <script src="{% static 'vendor/bootstrap/js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
